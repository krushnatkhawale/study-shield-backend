spring:
  cloud:
    gateway:
      routes:
        - id: content-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/boards/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**

  main:
    web-application-type: reactive

server:
  port: 0
